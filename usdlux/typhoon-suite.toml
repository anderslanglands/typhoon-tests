[suite]
name = "usdlux"

[render]
args = ["--disableCameraLight"]
output_pattern = "{stem}-embree.{frame:04d}.exr"

[reference]
dir = "reference"
pattern = "{stem}-embree.{frame:04d}.exr"
missing = "fail"

[comparison]

[frames]
cylinder = "1:63"
disk = "1:63"
distant = "1:35"
dome = "1:1"
iesLibPreview = "1:30"
rect = "1:63"
sphere = "1:63"
visibleRect = "1:10"

[skip]
iesTest = "committed reference is a two-camera mosaic; this runner renders one product per frame"
ies_scale = "no committed reference images"
iesUp = "no committed reference images"
iesDown = "no committed reference images"
"materials.usda" = "shared material layer, not a standalone render case"
"camera.usda" = "shared camera layer, not a standalone render case"
"floor_plane.usda" = "shared floor plane layer, not a standalone render case"
"small_angled_rect.usda" = "shared small angled rectangle layer, not a standalone render case"
"settings.usda" = "shared render settings layer, not a standalone render case"
"shapes/sphere50x50.usda" = "supporting layer, not a standalone render case"
